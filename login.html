<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="icon"
        href="img/pngtree-flatstyle-social-media-icon-quiz-with-help-button-vector-png-image_49602758 (1).jpg"
        type="image/jpg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>
    <div class="container bg-log">
        <div id="loginDiv" class="box2 box">
            <h2>Login</h2>
            <div class="input-group">
                <input type="text" id="loginUser" placeholder="Username " class="input-box"><i class="fa fa-user-o"
                    aria-hidden="true"></i><br>

            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Password" class="input-box"><br><i
                    class="fa fa-unlock-alt" aria-hidden="true"></i><br>

            </div>

            <button onclick="login()" class="btn">Login</button>
            <div class="redirect">
                <a href="index.html">Redirect To Register </a>

            </div>
            <!-- <button onclick="logout()">Logout</button> -->

            <!-- <a href="#" onclick="showRegister()">Register</a> -->
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
