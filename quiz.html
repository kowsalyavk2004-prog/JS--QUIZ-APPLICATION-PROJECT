<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
 <link rel="icon"
        href="img/pngtree-flatstyle-social-media-icon-quiz-with-help-button-vector-png-image_49602758 (1).jpg"
        type="image/jpg">
        
<link rel="stylesheet" href="css/style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>


<body>


    <div class="container bg">
        <div class="logout-box">
         
            <button onclick="logout()" class="logout-btn">Logout <i class="fa fa-sign-out" aria-hidden="true"></i></button>

        </div>

        <div id="timer" class="time">Time: 120</div>

        <div id="quizBox" class="box1 ">


            <h3 id="qNumber"></h3>
            <h2 id="question"></h2>
            <div id="options"></div>

            <button id="prevBtn" onclick="prevQ()" class="btn-left">Previous</button>

            <button id="nextBtn" onclick="nextQ()" class="btn-right">Next</button>
            <button id="submitBtn" onclick="submitQuiz()" style="display:none;" class="btn-right">Submit</button>



        </div>


        <div id="result" class="resul-box"></div>




    </div>





    <script src="script.js"></script>
</body>

</html>
