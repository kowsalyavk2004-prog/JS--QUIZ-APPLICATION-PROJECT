<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
     <link rel="icon"
        href="img/pngtree-flatstyle-social-media-icon-quiz-with-help-button-vector-png-image_49602758 (1).jpg"
        type="image/jpg">

<link rel="stylesheet" href="css/style.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>


<body>




    <div class="container ">

        <div id="registerDiv" class="box ">
            <h2>Register</h2>
            <div class="input-group">

                <input type="text" id="regUser" placeholder="Username" class="input-box"> <i class="fa fa-user-o"
                    aria-hidden="true"></i><br>

            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email" class="input-box" required> <i
                    class="fa fa-envelope-o" aria-hidden="true"></i><br>

            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="Password" class="input-box"><i class="fa fa-unlock-alt"
                    aria-hidden="true"></i><br>

            </div>

            <div class="input-group">
                <input type="password" id="regConfirmPass" placeholder="Confirm Password" class="input-box"
                    required><br><i class="fa fa-unlock-alt" aria-hidden="true"></i><br>

            </div>


            <button onclick="register()" class="btn">Register</button>
            <div class="redirect">
                <a href="login.html">I have a already account</a>

            </div>



        </div>




    </div>





    <script src="script.js"></script>


</html>
</body>

</html>
</body>
